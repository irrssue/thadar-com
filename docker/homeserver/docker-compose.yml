services:
  thadar:
    image: ghcr.io/irrssue/thadar:latest
    container_name: thadar_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - /home/irrssue/thadar.com/.env
    depends_on:
      thadar_postgres:
        condition: service_healthy
    networks:
      - thadar_net

  thadar_postgres:
    image: postgres:16-alpine
    container_name: thadar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: thadar
      POSTGRES_DB: thadar
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets:
      - pg_password
    volumes:
      - thadar_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thadar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - thadar_net

secrets:
  pg_password:
    file: /home/irrssue/secrets/thadar_pg_password

volumes:
  thadar_pgdata:
    external: true
    name: thadar_pgdata

networks:
  thadar_net:
    name: thadar_net
