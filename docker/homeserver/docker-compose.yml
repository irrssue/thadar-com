services:
  thadar:
    image: ghcr.io/irrssue/thadar:latest
    container_name: thadar_app
    restart: unless-stopped
    # host networking: container sees 127.0.0.1:5433 (postgres) and binds :3001
    # same as PM2 — Cloudflare Tunnel proxies localhost:3001
    network_mode: host
    env_file:
      - /home/irrssue/thadar.com/.env
