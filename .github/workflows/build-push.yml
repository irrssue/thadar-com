name: Build and Push

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "THADAR_PLAN.md"

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/irrssue/thadar
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          printf 'Host ssh.irrssue.com\n  User irrssue\n  IdentityFile ~/.ssh/deploy_key\n  ProxyCommand cloudflared access ssh --hostname %%h\n  StrictHostKeyChecking yes\n' >> ~/.ssh/config

      - name: Pull and restart
        env:
          SHA_TAG: sha-${{ github.sha }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          # Write deploy script to a temp file — avoids heredoc inside YAML
          cat > /tmp/deploy.sh << 'SCRIPT'
          #!/usr/bin/env bash
          set -e
          cd ~/thadar.com
          docker pull ghcr.io/irrssue/thadar:latest
          docker compose -f docker/homeserver/docker-compose.yml up -d --no-build thadar
          docker image prune -f --filter "until=24h" \
            --filter "label=org.opencontainers.image.source=https://github.com/irrssue/thadar.com"
          echo "deployed: $DEPLOY_SHA"
          SCRIPT

          # docker login: pipe token via stdin to remote shell
          printf '%s' "$GHCR_READ_TOKEN" | ssh ssh.irrssue.com \
            'docker login ghcr.io -u irrssue --password-stdin'

          # copy script then execute with SHA injected as env var (no ${{ }} on remote)
          scp /tmp/deploy.sh ssh.irrssue.com:/tmp/thadar-deploy.sh
          ssh ssh.irrssue.com "DEPLOY_SHA='$SHA_TAG' bash /tmp/thadar-deploy.sh"
